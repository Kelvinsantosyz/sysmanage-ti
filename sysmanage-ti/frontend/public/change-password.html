<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alterar Senha — SysManage TI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin: 0 auto 16px;
      box-shadow: 0 4px 16px rgba(99,102,241,0.4);
    }

    .card-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: 0.85rem;
      color: #64748b;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .hidden {
      display: none !important;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      color: #0f172a;
      background: #f8fafc;
      transition: all 0.15s ease;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: #6366f1;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    #msg {
      font-size: 0.83rem;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      min-height: 20px;
      display: none;
    }

    #msg.error {
      display: block;
      background: #fee2e2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    #msg.success {
      display: block;
      background: #d1fae5;
      color: #059669;
      border: 1px solid #a7f3d0;
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.18s ease;
      margin-top: 4px;
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99,102,241,0.4);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
    }

    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="card-icon">🔐</div>
      <h2>Alterar Senha</h2>
      <p id="subtitle">Defina uma nova senha para sua conta</p>
    </div>

    <form id="formChangePassword" autocomplete="off">
      <div class="form-group hidden" id="wrapCurrentPassword">
        <label for="currentPassword">Senha Atual</label>
        <input type="password" id="currentPassword" placeholder="Digite sua senha atual" autocomplete="current-password">
      </div>

      <div class="form-group">
        <label for="newPassword">Nova Senha</label>
        <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Nova Senha</label>
        <input type="password" id="confirmPassword" placeholder="Repita a nova senha" autocomplete="new-password">
      </div>

      <div id="msg"></div>

      <button type="button" class="btn-submit" id="btnSalvar">Salvar Nova Senha</button>
    </form>

    <a href="dashboard.html" class="back-link hidden" id="wrapVoltar">← Voltar ao painel</a>
  </div>

  <script src="js/change-password.js"></script>
</body>
</html>
