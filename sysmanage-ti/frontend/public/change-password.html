<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Alterar senha - SysManage TI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/register.css">

</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

<div class="card shadow-lg p-4 w-100" style="max-width:420px">

<div class="text-center mb-4">
<h3 class="fw-bold">Alterar senha</h3>
<p class="text-muted small" id="subtitle">
Defina uma nova senha para sua conta
</p>
</div>

<form id="formChangePassword">

<div id="wrapCurrentPassword" class="mb-3 d-none">

<label class="form-label">Senha atual</label>

<input
type="password"
id="currentPassword"
class="form-control"
placeholder="Digite a senha atual"
autocomplete="current-password">

</div>

<div class="mb-3">

<label class="form-label">Nova senha</label>

<input
type="password"
id="newPassword"
class="form-control"
placeholder="Mínimo 6 caracteres"
minlength="6"
autocomplete="new-password"
required>

</div>

<div class="mb-3">

<label class="form-label">Confirmar nova senha</label>

<input
type="password"
id="confirmPassword"
class="form-control"
placeholder="Repita a nova senha"
autocomplete="new-password"
required>

</div>

<p id="msg" class="text-danger small mb-0"></p>

<div class="d-grid mt-3">

<button
type="button"
class="btn btn-primary"
id="btnSalvar">

Salvar nova senha

</button>

</div>

</form>

<div class="text-center mt-3" id="wrapVoltar">

<a href="dashboard.html" class="small">
Voltar ao painel
</a>

</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/change-password.js"></script>

</body>
</html>
