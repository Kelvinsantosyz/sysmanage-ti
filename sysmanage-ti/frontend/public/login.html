<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login - SysManage</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS Personalizado -->
<link rel="stylesheet" href="css/register.css">

</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

  <div class="card shadow-lg p-4 w-100" style="max-width: 420px;">
    
    <div class="text-center mb-4">
      <h3 class="fw-bold">Login</h3>
      <p class="text-muted small">Acesse o SysManage TI</p>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control" placeholder="Digite seu email">
    </div>

    <div class="mb-3">
      <label class="form-label">Senha</label>
      <input type="password" id="password" class="form-control" placeholder="Digite sua senha">
    </div>

    <div class="d-grid">
      <button onclick="login()" class="btn btn-primary">
        Entrar
      </button>
    </div>

    <p id="msg" class="text-danger mt-3 text-center small"></p>

    <div class="text-center mt-3">
      <a href="register.html" class="small">Não tem conta? Criar conta</a>
    </div>

  </div>

</div>

<script src="js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
