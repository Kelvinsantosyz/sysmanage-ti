<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — SysManage TI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
  <script>
    // Aplica tema antes do render para evitar flash
    (function() { if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); })();
  </script>
</head>

<body>

  <div class="auth-wrapper">

    <div class="auth-logo">
      <div class="auth-logo-icon">🖥️</div>
      <span class="auth-logo-text">SysManage TI</span>
    </div>

    <div class="auth-card">
      <div class="auth-header">
        <h1>Bem-vindo de volta</h1>
        <p>Entre com suas credenciais para continuar</p>
      </div>

      <form class="auth-form" onsubmit="event.preventDefault(); login();">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn-auth">Entrar na plataforma</button>

        <p id="msg" class="auth-msg"></p>
      </form>

      <div class="auth-divider">ou</div>

      <div class="auth-secondary">
        <p>Novo no SysManage?</p>
        <a href="register.html" class="btn-auth-secondary">Criar nova conta</a>
      </div>
    </div>

  </div>

  <!-- Botão de tema -->
  <button id="themeToggleAuth" title="Alternar tema" style="position:fixed; top:16px; right:16px; background:transparent; border:1px solid var(--border); border-radius:50%; width:38px; height:38px; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:all 0.18s;">🌙</button>

  <script src="js/auth.min.js"></script>
  <script>
    (function() {
      var btn = document.getElementById('themeToggleAuth');
      if (localStorage.getItem('theme') === 'dark') btn.textContent = '☀️';
      btn.addEventListener('click', function() {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
          btn.textContent = '🌙';
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
          btn.textContent = '☀️';
        }
      });
    })();
  </script>

</body>

</html>
