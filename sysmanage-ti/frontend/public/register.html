<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - SysManage</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .card {
            border: none;
            border-radius: 12px;
        }
        .form-control {
            padding: 0.6rem 0.75rem;
            border-radius: 8px;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25 margin-rgba(13, 110, 253, 0.15);
        }
        .btn-primary {
            padding: 0.6rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2);
        }
        .btn-outline-secondary {
            border-radius: 8px;
            font-size: 0.85rem;
            border-color: #dee2e6;
            color: #6c757d;
        }
        .btn-outline-secondary:hover {
            background-color: #f8f9fa;
            border-color: #ced4da;
            color: #495057;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="card shadow-lg p-4 w-100" style="max-width: 420px;">
        
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">Criar Conta</h3>
            <p class="text-muted small">Cadastre-se no <span class="fw-semibold text-primary">SysManage TI</span></p>
        </div>

        <form id="registerForm" onsubmit="event.preventDefault(); handleRegister();">
            <div class="mb-3">
                <label class="form-label fw-semibold small text-secondary">Nome Completo</label>
                <input type="text" id="name" class="form-control" placeholder="Ex: João Silva" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold small text-secondary">E-mail Corporativo</label>
                <input type="email" id="email" class="form-control" placeholder="nome@empresa.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold small text-secondary">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Finalizar Cadastro
                </button>
            </div>
        </form>

        <p id="msg" class="text-danger mt-3 text-center small fw-medium" style="min-height: 20px;"></p>

        <hr class="text-muted my-4">

        <div class="text-center">
            <p class="small text-muted mb-2">Já possui acesso?</p>
            <a href="login.html" class="btn btn-outline-secondary w-100">
                Fazer Login
            </a>
        </div>

    </div>

</div>

<script src="js/auth.min.js"></script>
<script>
    // Função para tratar o clique antes de chamar o auth.min.js
    function handleRegister() {
        const msg = document.getElementById('msg');
        msg.innerText = ""; // Limpa mensagens anteriores

        // Chama a função que está no seu arquivo auth.min.js
        if (typeof register === "function") {
            register();
        } else {
            console.error("Função register() não encontrada em auth.min.js");
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
