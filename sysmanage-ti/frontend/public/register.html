<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Criar Conta — SysManage TI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-wrapper">

  <div class="auth-logo">
    <div class="auth-logo-icon">🖥️</div>
    <span class="auth-logo-text">SysManage TI</span>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <h1>Criar conta</h1>
      <p>Preencha os dados para se cadastrar</p>
    </div>

    <form class="auth-form" id="registerForm" onsubmit="event.preventDefault(); handleRegister();">
      <div class="form-group">
        <label for="name">Nome Completo</label>
        <input type="text" id="name" placeholder="Ex: João Silva" autocomplete="name" required>
      </div>

      <div class="form-group">
        <label for="email">E-mail Corporativo</label>
        <input type="email" id="email" placeholder="nome@empresa.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
      </div>

      <button type="submit" class="btn-auth">Finalizar Cadastro</button>

      <p id="msg" class="auth-msg"></p>
    </form>

    <div class="auth-divider">ou</div>

    <div class="auth-secondary">
      <p>Já possui acesso?</p>
      <a href="login.html" class="btn-auth-secondary">Fazer Login</a>
    </div>
  </div>

</div>

<script src="js/auth.min.js"></script>
<script>
  function handleRegister() {
    const msg = document.getElementById('msg');
    msg.className = 'auth-msg';
    msg.innerText = '';
    if (typeof register === 'function') {
      register();
    }
  }

  // Override msg display para usar as novas classes
  const origMsg = document.getElementById('msg');
  const observer = new MutationObserver(() => {
    if (origMsg.innerText) {
      const isSuccess = origMsg.innerText.toLowerCase().includes('sucesso');
      origMsg.className = 'auth-msg ' + (isSuccess ? 'success' : 'error');
    }
  });
  observer.observe(origMsg, { childList: true, characterData: true, subtree: true });
</script>

</body>
</html>
